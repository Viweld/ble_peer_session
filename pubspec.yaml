name: ble_peer_session
description: Offline BLE peer-to-peer sessions for Flutter — discovery, consent handshake, and bidirectional messaging.
version: 0.3.1
homepage: https://github.com/Viweld/ble_peer_session
repository: https://github.com/Viweld/ble_peer_session
issue_tracker: https://github.com/Viweld/ble_peer_session/issues

topics:
  - bluetooth
  - ble
  - flutter
  - p2p
  - peer-to-peer

environment:
  sdk: ^3.12.0
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  bluetooth_low_energy: ^6.2.1
  flutter_blue_plus: ^2.3.8
  permission_handler: ^12.0.3
  device_info_plus: ^13.1.0
  url_launcher: ^6.3.2
  meta: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
